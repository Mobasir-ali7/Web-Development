<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>UNIVERSITY REGISTRATION FORM</h1>
<H4>Please fill the form</H4>
<hr>
<h2>Personal Details</h2>

<label for="first name">FIRST NAME</label>
<input type="text" name="first name" id="first name" placeholder="ex: MOHAMMAD">
<br><br>

<label for="last name">LAST NAME</label>
<input type="text" name="last name" id="last name" placeholder="ex:ALI" >
<br><br>

<label for="DOB">DOB</label>
<input type="date" name="DOB" id="DOB" >
<br><br>

<H3>Gender</H3>
<label for="male">male</label>
     <input type="radio" name="gender" id="male" value="male"><br>
     <label for="female">female</label>
     <input type="radio" name="gender" id="female" value="female"><br>
     <label for="OTHER">OTHER</label>
     <input type="radio" name="gender" id="OTHER" value="other">
     <br><br>

    <HR><h2>UPLOAD YOUR PHOTO</h2></HR> 
    
    <input type="file" name="file">
    <hr>

    <H2>Contact Information</H2>

    <label for="email">Email id</label>
<input type="text" name="email" id="email" placeholder="ex: MOHAMMAD@gmail.com">
<br><br>

<label for="Phone number">Phone Number</label>
<input type="tel" name="Phone number" id="Phone number" placeholder="ex: 83489XXXXX">
<br><br>

<label for="Phone number">Phone Number</label>
<input type="number" name="Phone number" id="Phone number" placeholder="ex: 83489XXXXX">
<br><br>

<label for="adress">Mailing Adress</label><br>
<textarea name="adress" id="adress"></textarea>
<hr>

<h2>Academic Information</h2>

<label for="course">select your course</label>
<select name="course" id="course">
<option value="cse">cse</option>
<option value="ME">ME</option>
<option value="EN">EN</option>

</select>
<br>

<h2>Other Activity</h2>
<label for="sports">sports</label>
<input type="checkbox" name="sports" id="sports" value="sports">
<br><br>
<label for="music">music</label>
<input type="checkbox" id="music" name="music" value="music">
<br><br>
<label for="dancing">Dancing</label>
<input type="checkbox" id="dancing" name="dancing " value="dancing">
<br><br>

<hr>

<h2>Create Your Account</h2>

<label for="passowd">Create a passowd</label>
<input type="password" name="passowd" id="passowd" placeholder="ex: hgs83XXX">
<br><br>

<label for="Question">Security Question</label>
<input type="text" name="Question" id="Question" placeholder="ex: what is your Favourite food">
<br><br>

<label for="Phone number">Security Answer</label>
<input type="text" name="Phone number" id="Phone number" placeholder="ex: 83489XXXXX">
<br><br>

<label for="term condition">I agree with the term and condition</label>
<input type="checkbox" id="term condition" value="term condition">

<hr>

<button type="submit">Register</button><br><br>
<button type="reset">clear form</button>


</body>
</html>
